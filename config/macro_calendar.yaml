# 주요 매크로 경제 일정 (섹션 [4] 입력)
#
# 무료·무키 정책상 안정적인 크롤링 소스가 마땅치 않아, 반복되는 주요 일정은
# 여기서 직접 관리한다. 매월/분기별로 확정 일정을 확인해 fixed 항목을 갱신하면 된다.
#
# - fixed:     특정 날짜에 1회성으로 발생하는 이벤트 (date + title)
# - recurring: 규칙적으로 반복되는 이벤트 (recurring 규칙 + title)
#
# 공통 선택 필드:
#   note:   한 줄 설명(왜 조심해야 하는지)
#   time:   "21:30" 처럼 발표 시각(KST). 있으면 금일 시간표에 정렬됨. 없으면 생략.
#   impact: 중요도 아이콘 — 🔥 높음(FOMC·CPI·고용) / ⚡ 보통(2차 지표) / ❄️ 낮음. 기본 🔥.
#
# recurring 규칙 필드:
#   month:   1~12  (해당 월에만)
#   day:     1~31  (해당 일에만)
#   weekday: 0=월 ... 6=일
#   week:    N번째 주 (week+weekday 조합, 예: 옵션만기 = 둘째 목요일)

# ⚠️ fixed 항목은 '실제 발표일'을 직접 확인해 채워야 합니다.
#    날짜가 실제와 다르면(예: 이미 발표된 지표가 계속 '예정'으로 뜸) 혼란을 주므로,
#    확정된 날짜만 추가하세요. (지난 날짜·오늘 이후 7일 밖 항목은 자동으로 숨겨집니다.)
#    예:
#    - date: 2026-08-12
#      title: "미국 7월 소비자물가지수(CPI) 발표"
#      time: "21:30"
#      impact: "🔥"
#      note: "물가 서프라이즈 시 변동성 확대 가능 — 관련주 뇌동매매 주의"
fixed: []

recurring:
  # 매월 둘째 목요일 = 국내 지수·개별옵션 동시만기(쿼드러플위칭 근접월 포함)
  - title: "선물·옵션 만기일 (변동성 확대 구간)"
    note: "만기일 수급 왜곡 가능 — 종가 부근 급변 주의"
    impact: "🔥"
    recurring:
      weekday: 3   # 목요일
      week: 2      # 둘째 주
  # 매월 첫째 금요일 = 미국 고용보고서(비농업)
  - title: "미국 고용보고서(비농업 고용지수) 발표"
    note: "고용 서프라이즈 시 금리 기대 변화 → 성장주 변동성"
    time: "21:30"
    impact: "🔥"
    recurring:
      weekday: 4   # 금요일
      week: 1      # 첫째 주
