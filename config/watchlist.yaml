# 주요 테마 종목 워치리스트 (섹션 2: 주도 섹터 & 주목 종목)
#
# 관심 테마와 종목을 여기서 직접 관리합니다. (잡주 대신 엄선한 우량주)
# 브리핑은 매일 '그날 강한 섹터 순서'로 정렬해 보여줍니다.
#   각 테마 = 국내 대장주 1개 + 해외주(미장) 2개  (미장 위주로 압축)
#   ticker 는 yfinance 형식:
#     - 국내: KOSPI=6자리.KS, KOSDAQ=6자리.KQ  → 원화(원) 표시
#     - 해외(미장): 티커만 (예: NVDA, TSLA)     → 달러($) 표시
#   emoji 는 섹션 제목 앞에 붙는 아이콘입니다.

