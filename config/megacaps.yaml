# 핵심 대형주 워치 (시총 상위 벨웨더)
#
# '주도 섹터'(섹션 2)는 그날 거래대금 상위로 종목이 매일 바뀌지만, 이 패널은
# 시가총액 상위 핵심주를 '항상 고정'으로 보여줘 같은 종목의 흐름을 매일 추적한다.
# 매일 보는 값은 '전일 대비 등락률'이다(시총은 선정 기준일 뿐 매일 표시하진 않음).
#   ticker 는 yfinance 형식:
#     - 국내: KOSPI=6자리.KS, KOSDAQ=6자리.KQ  → 원화(원) 표시
#     - 해외(미장): 티커만 (예: NVDA)          → 달러($) 표시
# ※ 종목을 바꾸려면 여기만 편집하면 됩니다. (yaml 순서대로 노출, 통화로 국내/미국 자동 구분)

stocks:
  # 국내 — 코스피 시총 1·2위 대장주
  - { name: "삼성전자",       ticker: "005930.KS" }
  - { name: "SK하이닉스",     ticker: "000660.KS" }
  # 미장 — M7(매그니피센트 7) 대표 빅테크
  - { name: "엔비디아",       ticker: "NVDA" }
  - { name: "구글(알파벳)",   ticker: "GOOGL" }
  - { name: "테슬라",         ticker: "TSLA" }
  - { name: "애플",           ticker: "AAPL" }
  - { name: "마이크로소프트", ticker: "MSFT" }
