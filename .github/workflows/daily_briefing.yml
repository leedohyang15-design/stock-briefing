name: Daily Stock Briefing

# 평일(월~금) 아침 KST 09시 전후 도착을 목표로 실행.
#   cron 23:35 UTC (일~목) = 08:35 KST (월~금)
#   → GitHub Actions 예약은 '정시(:00)'에 부하가 몰려 크게 지연되므로,
#     정시를 피한 08:35 목표로 잡아 지연을 흡수해 9시 전후에 도착하도록 함.
#   ※ GitHub 무료 cron 은 '최선 노력(best-effort)'이라 수 분~수십 분 지연될 수 있음.
#      정확한 정시 도착이 꼭 필요하면 외부 스케줄러(cron-job.org 등)로
#      repository_dispatch 를 트리거하는 방식을 검토.
# 한국 공휴일 휴장일 스킵은 코드(src/holidays_kr.py)가 담당한다.
on:
  schedule:
    - cron: "35 23 * * 0-4"
  workflow_dispatch:      # 수동 실행(테스트) 지원
    inputs:
      force:
        description: "휴장일에도 강제 발송 (테스트용)"
        type: boolean
        default: false

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM_NAME: ${{ vars.MAIL_FROM_NAME }}
          KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_REDIRECT_URI: ${{ vars.KAKAO_REDIRECT_URI }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python -m src.main --force
          else
            python -m src.main
          fi
